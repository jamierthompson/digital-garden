name: Deploy Sanity Schema

# Deploys the Studio's content-model schema to the hosted Content Lake so apps
# like Dashboard/Canvas/Agent Actions see the current model.
#
# NOTE: this workflow is DISABLED in the GitHub Actions UI (repo Settings → Actions →
# this workflow → "Disable workflow"), so GitHub does NOT run it despite the triggers
# below — they are kept for when it's re-enabled. It's also broken: `sanity schemas
# deploy` SIGABRTs in Rolldown's native binary on linux-x64 CI and darwin-x64, so schema
# is refreshed via `sanity deploy` instead. Fixing/retiring this is tracked in
# https://github.com/jamierthompson/digital-garden/issues/43.
# (See docs/security-and-ops.md.)

on:
  # Manual trigger — covers the first deploy and any ad-hoc redeploy.
  workflow_dispatch:
  # Auto-redeploy only when the schema actually changes on main.
  push:
    branches: [main]
    paths:
      - studio/schemaTypes/**
      - studio/sanity.config.ts
      - studio/sanity.cli.ts

# Schema deploy mutates shared hosted state; serialize runs so two deploys
# can't race. Don't cancel an in-flight deploy — let it finish.
concurrency:
  group: deploy-schema
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # This job only talks to Sanity (via SANITY_AUTH_TOKEN); it never uses
    # GITHUB_TOKEN. Drop all of its default permissions (least privilege).
    permissions: {}
    # Cap a hung/wedged deploy so it can't run to the runner's 6h default.
    timeout-minutes: 10
    # Sanity project ID and dataset are public (shipped to the browser), not
    # secrets — same as ci.yml. The Studio also reads them from sanity.cli.ts.
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: 7id6sf36
      NEXT_PUBLIC_SANITY_DATASET: production
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Deploy the schema from the studio/ workspace so the CLI picks up
      # studio/sanity.cli.ts + sanity.config.ts (projectId, dataset, workspace).
      #
      # Auth: in CI there's no `sanity login`, so the CLI reads a deploy token
      # from the SANITY_AUTH_TOKEN env var. We source it from the repo secret
      # SANITY_DEPLOY_TOKEN (Deploy/Editor scope). NEVER hardcode a token.
      # Ref: https://www.sanity.io/docs/apis-and-sdks/schema-deployment
      - name: Deploy schema
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_DEPLOY_TOKEN }}
        run: pnpm --filter studio exec sanity schemas deploy --verbose
